{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<section class="login-section">
    <div class="login-card">
        <div class="login-header">
            <img src="{{ url_for('static', filename='images/hda_logo.png') }}" alt="HDA Logo" class="login-logo">
            <h2>Member Login</h2>
            <p>Sign in to access your dashboard</p>
        </div>
        <form method="POST" action="{{ url_for('auth.login') }}" class="login-form">
            <div class="form-group">
                <label for="username"><i class="fas fa-user"></i> Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter your username"
                    autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password"
                    autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-gold btn-full">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>
        <div class="login-footer">
            <p>Contact the Secretary General if you need login credentials.</p>
        </div>
    </div>
</section>
{% endblock %}
